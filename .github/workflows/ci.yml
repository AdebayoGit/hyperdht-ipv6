# CI is local-first: run `bash scripts/ci-local.sh` (or `npm run ci`).
# This workflow never runs automatically — it only fires on manual dispatch
# and targets self-hosted runners, so it consumes no hosted minutes.
name: harness
on:
  workflow_dispatch:

jobs:
  gates:
    name: full local gate matrix
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: setup workbenches
        run: bash scripts/setup.sh
      - name: run gates
        run: bash scripts/ci-local.sh
